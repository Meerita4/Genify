version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: genify_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: genify_user
      POSTGRES_PASSWORD: genify_pass
      POSTGRES_DB: genify_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
